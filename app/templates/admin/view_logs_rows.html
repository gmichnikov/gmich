{% for log in log_entries %}
<tr>
  <td class="log-timestamp">{{ log.formatted_timestamp }}</td>
  <td class="log-user">{{ log.actor.email if log.actor else 'N/A' }}</td>
  <td class="log-project">{{ log.project if log.project else '—' }}</td>
  <td class="log-category">{{ log.category }}</td>
  <td class="log-description">{{ log.description }}</td>
</tr>
{% else %}
<tr>
  <td colspan="5" class="logs-empty-row">No log entries match your filters.</td>
</tr>
{% endfor %}
