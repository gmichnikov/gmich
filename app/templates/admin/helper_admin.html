{% extends 'base.html' %}

{% block title %}Helper Admin{% endblock %}

{% block content %}
<div class="admin-page-container">
    <div class="admin-card">
        <div class="admin-header">
            <h1 class="admin-title">Helper Admin</h1>
            <p class="admin-subtitle">Manage groups, members, and view logs</p>
            <p style="margin-top:0.75rem;">
                <a href="{{ url_for('helper.index') }}" class="admin-link" style="font-size:0.95rem;">Open Helper (member view) →</a>
            </p>
        </div>

        <div style="display:flex; flex-direction:column; gap:1rem;">
            <a href="{{ url_for('admin.helper_groups') }}" class="admin-submit-btn" style="display:block; text-decoration:none; text-align:center;">
                👥 Groups &amp; Members
            </a>
            <a href="{{ url_for('admin.helper_tasks') }}" class="admin-submit-btn" style="display:block; text-decoration:none; text-align:center; background:#0d9488;">
                📌 Tasks (audit)
            </a>
            <a href="{{ url_for('admin.helper_email_detail') }}" class="admin-submit-btn" style="display:block; text-decoration:none; text-align:center; background:#4f46e5;">
                🔍 Email Detail (inbound + actions)
            </a>
            <a href="{{ url_for('admin.helper_action_log') }}" class="admin-submit-btn" style="display:block; text-decoration:none; text-align:center; background:#6b7280;">
                📋 Action Log
            </a>
        </div>

        <div class="admin-footer">
            <p class="admin-footer-text"><a href="{{ url_for('main.index') }}" class="admin-link">← Back to Home</a></p>
        </div>
    </div>
</div>
{% endblock %}
