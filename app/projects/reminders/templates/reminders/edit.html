{% extends "base.html" %}

{% block title %}Edit Reminder{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('reminders.static', filename='reminders.css') }}">
{% endblock %}

{% block content %}
<div class="reminders-page">
    <div class="reminders-container">

        <div class="reminders-header">
            <h1 class="reminders-title">Edit Reminder</h1>
        </div>

        <div class="reminders-card">
            <form method="post" action="{{ url_for('reminders.update', reminder_id=reminder.id) }}" class="reminders-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="reminders-form-group">
                    <label for="title" class="reminders-label">Title <span class="reminders-required">*</span></label>
                    <input
                        type="text"
                        id="title"
                        name="title"
                        class="reminders-input"
                        value="{{ reminder.title }}"
                        required
                        autofocus
                    >
                </div>

                <div class="reminders-form-group">
                    <label for="body" class="reminders-label">Details <span class="reminders-optional">(optional)</span></label>
                    <textarea
                        id="body"
                        name="body"
                        class="reminders-textarea"
                        rows="3"
                    >{{ reminder.body or '' }}</textarea>
                </div>

                <div class="reminders-form-group">
                    <label for="remind_at" class="reminders-label">
                        When <span class="reminders-required">*</span>
                        <span class="reminders-tz-hint">({{ tz_name }})</span>
                    </label>
                    <input
                        type="datetime-local"
                        id="remind_at"
                        name="remind_at"
                        class="reminders-input"
                        value="{{ remind_at_local }}"
                        required
                    >
                    <p class="reminders-field-hint">Reminders fire within ~5 minutes of the selected time.</p>
                </div>

                <div class="reminders-form-actions">
                    <button type="submit" class="reminders-btn reminders-btn-primary">Save Changes</button>
                    <a href="{{ url_for('reminders.index') }}" class="reminders-btn reminders-btn-secondary">Cancel</a>
                </div>
            </form>
        </div>

        <div class="reminders-danger-zone">
            <form method="post" action="{{ url_for('reminders.delete', reminder_id=reminder.id) }}" onsubmit="return confirm('Delete this reminder?');">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button type="submit" class="reminders-btn reminders-btn-danger">Delete Reminder</button>
            </form>
        </div>

    </div>
</div>

<script>
// Prevent selecting a time in the past
const dtInput = document.getElementById('remind_at');
const now = new Date();
const pad = n => String(n).padStart(2, '0');
const localMin = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
dtInput.min = localMin;
</script>
{% endblock %}
