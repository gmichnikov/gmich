{% extends "base.html" %}

{% block title %}Edit {{ collection.name }} - Travel Log{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('travel_log.static', filename='tlog.css') }}">
{% endblock %}

{% block content %}
<div class="tlog-page">
    <div class="tlog-container">
        <h1 class="tlog-title">Rename Collection</h1>

        <form method="post" action="{{ url_for('travel_log.collections_update', id=collection.id) }}" class="tlog-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="tlog-form-group">
                <label for="tlog-collection-name" class="tlog-label">Name</label>
                <input
                    type="text"
                    id="tlog-collection-name"
                    name="name"
                    class="tlog-input"
                    value="{{ collection.name }}"
                    required
                    autofocus
                >
            </div>
            <div class="tlog-form-actions">
                <button type="submit" class="tlog-btn tlog-btn-primary">Save</button>
                <a href="{{ url_for('travel_log.index') }}" class="tlog-btn tlog-btn-secondary">Cancel</a>
            </div>
        </form>

        <div class="tlog-form-divider"></div>

        <form method="post" action="{{ url_for('travel_log.collections_delete', id=collection.id) }}" class="tlog-delete-form" onsubmit="return confirm('Are you sure? This will permanently delete {{ entry_count }} {{ 'entry' if entry_count == 1 else 'entries' }}.');">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="tlog-btn tlog-btn-danger">Delete Collection</button>
        </form>
    </div>
</div>
{% endblock %}
