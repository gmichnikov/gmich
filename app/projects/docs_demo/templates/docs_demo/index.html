<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docs Demo - gregmichnikov.com</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('docs_demo.static', filename='docs_demo/style.css') }}?v=2">
</head>
<body class="docs-demo-body-root">

<!-- ─── TOP BAR ─── -->
<div class="docs-demo-top-bar">
  <div class="docs-demo-docs-icon" title="Docs home">
    <svg viewBox="0 0 72 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M45 0H7C3.13 0 0 3.13 0 7v86c0 3.87 3.13 7 7 7h58c3.87 0 7-3.13 7-7V27L45 0z" fill="#4285F4"/>
      <path d="M45 0v20c0 3.87 3.13 7 7 7h20L45 0z" fill="#A1C2FA"/>
      <path d="M18 48h36v4H18zm0 10h36v4H18zm0 10h24v4H18z" fill="#fff"/>
    </svg>
  </div>

  <div class="docs-demo-title-and-menu">
    <div class="docs-demo-title-row">
      <div class="docs-demo-doc-title" contenteditable="true" spellcheck="false">Untitled document</div>

      <div class="docs-demo-title-icon-btn" title="Star">
        <svg viewBox="0 0 24 24"><path d="M22 9.24l-7.19-.62L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.63-7.03L22 9.24zM12 15.4l-3.76 2.27 1-4.28-3.32-2.88 4.38-.38L12 6.1l1.71 4.04 4.38.38-3.32 2.88 1 4.28L12 15.4z" fill="currentColor"/></svg>
      </div>
      <div class="docs-demo-title-icon-btn" title="Move">
        <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z" fill="currentColor"/></svg>
      </div>
      <div class="docs-demo-title-icon-btn" title="See document status">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="currentColor"/></svg>
      </div>
    </div>

    <div class="docs-demo-menu-bar">
      <div class="docs-demo-menu-item">File</div>
      <div class="docs-demo-menu-item">Edit</div>
      <div class="docs-demo-menu-item">View</div>
      <div class="docs-demo-menu-item">Insert</div>
      <div class="docs-demo-menu-item">Format</div>
      <div class="docs-demo-menu-item">Tools</div>
      <div class="docs-demo-menu-item">Extensions</div>
      <div class="docs-demo-menu-item">Help</div>
    </div>
  </div>

  <div class="docs-demo-right-section">
    <div class="docs-demo-icon-btn" title="Last edit">
      <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
    </div>
    <div class="docs-demo-icon-btn" title="Comments">
      <svg viewBox="0 0 24 24"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18zM18 14H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
    </div>
    <div class="docs-demo-icon-btn" title="Meet">
      <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
    </div>

    <button class="docs-demo-share-btn">
      <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 3c1.66 0 3 1.34 3 3v2H9V6c0-1.66 1.34-3 3-3zm6 17H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
      Share
    </button>

    <div class="docs-demo-gemini-btn" id="docs-demo-gemini-btn" title="Toggle AI (Gemini)">
      <img src="{{ url_for('docs_demo.static', filename='docs_demo/Gemini-icon.png') }}" alt="Gemini" class="docs-demo-gemini-icon-img">
    </div>

    <div class="docs-demo-avatar" title="Account">A</div>
  </div>
</div>

<!-- ─── TOOLBAR ─── -->
<div class="docs-demo-toolbar-wrapper">
  <div class="docs-demo-tb-btn" title="Undo"><svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05 1-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg></div>
  <div class="docs-demo-tb-btn" title="Redo"><svg viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg></div>
  <div class="docs-demo-tb-btn" title="Print"><svg viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg></div>
  <div class="docs-demo-tb-btn" title="Spell check"><svg viewBox="0 0 24 24"><path d="M12.45 16h2.09L9.43 3H7.57L2.46 16h2.09l1.12-3h5.64l1.14 3zm-6.02-5L8.5 5.48 10.57 11H6.43zm15.16.59l-8.09 8.09L9.83 16l-1.41 1.41 5.09 5.09L23 13l-1.41-1.41z"/></svg></div>
  <div class="docs-demo-tb-btn" title="Paint format"><svg viewBox="0 0 24 24"><path d="M18 4V3c0-.55-.45-1-1-1H5c-.55 0-1 .45-1 1v4c0 .55.45 1 1 1h12c.55 0 1-.45 1-1V6h1v4H9v11c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-9h8V4h-3z"/></svg></div>

  <div class="docs-demo-tb-sep"></div>
  <div class="docs-demo-tb-select" title="Zoom"><span>100%</span><svg class="docs-demo-caret" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg></div>
  <div class="docs-demo-tb-sep"></div>
  <div class="docs-demo-tb-select" title="Styles" style="min-width: 100px;"><span>Normal text</span><svg class="docs-demo-caret" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg></div>
  <div class="docs-demo-tb-sep"></div>
  <div class="docs-demo-tb-select" title="Font" style="min-width: 120px;"><span>Arial</span><svg class="docs-demo-caret" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg></div>
  <div class="docs-demo-tb-sep"></div>
  <div class="docs-demo-tb-minus" title="Decrease font size"><svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg></div>
  <input class="docs-demo-tb-fontsize" value="11" readonly>
  <div class="docs-demo-tb-plus" title="Increase font size"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>

  <div class="docs-demo-tb-sep"></div>
  <div class="docs-demo-tb-btn" title="Bold"><svg viewBox="0 0 24 24"><path d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM10 6.5h3c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-3v-3zm3.5 9H10v-3h3.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5z"/></svg></div>
  <div class="docs-demo-tb-btn" title="Italic"><svg viewBox="0 0 24 24"><path d="M10 4v3h2.21l-3.42 8H6v3h8v-3h-2.21l3.42-8H18V4z"/></svg></div>
  <div class="docs-demo-tb-btn" title="Underline"><svg viewBox="0 0 24 24"><path d="M12 17c3.31 0 6-2.69 6-6V3h-2.5v8c0 1.93-1.57 3.5-3.5 3.5S8.5 12.93 8.5 11V3H6v8c0 3.31 2.69 6 6 6zm-7 2v2h14v-2H5z"/></svg></div>
  <div class="docs-demo-tb-btn" title="Strikethrough"><svg viewBox="0 0 24 24"><path d="M10 19h4v-3h-4v3zM5 4v3h5v3h4V7h5V4H5zM3 14h18v-2H3v2z"/></svg></div>

  <div class="docs-demo-tb-sep"></div>
  <div class="docs-demo-tb-color-btn" title="Text color">
    <svg viewBox="0 0 24 18"><path d="M11 2L5.5 16h2.25l1.12-3h6.25l1.12 3h2.25L13 2h-2zm-1.38 9L12 4.67 14.38 11H9.62z" fill="#444746"/></svg>
    <div class="docs-demo-tb-color-bar" style="background: #000;"></div>
  </div>
  <div class="docs-demo-tb-color-btn" title="Highlight color">
    <svg viewBox="0 0 24 18"><path d="M18 14l-4-4 1.41-1.41-1.42-1.42L12.58 8.6 7 3 5.59 4.41l5.58 5.59-3.76 3.76c-.39.39-.39 1.02 0 1.41l3.18 3.18c.2.2.45.29.71.29s.51-.1.71-.29l6-5.93z" fill="#444746"/></svg>
    <div class="docs-demo-tb-color-bar" style="background: transparent; border: 1px solid #ccc;"></div>
  </div>

  <div class="docs-demo-tb-sep"></div>
  <div class="docs-demo-tb-btn" title="Insert link"><svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg></div>
  <div class="docs-demo-tb-btn" title="Add comment"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12zm-5-5H13V9h-2v2H9v2h2v2h2v-2h2v-2z"/></svg></div>
  <div class="docs-demo-tb-btn" title="Insert image"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></div>

  <div class="docs-demo-tb-sep"></div>
  <div class="docs-demo-tb-btn" title="Align & indent"><svg viewBox="0 0 24 24"><path d="M3 21h18v-2H3v2zm0-4h18v-2H3v2zm0-4h18v-2H3v2zm0-4h18V7H3v2zm0-6v2h18V3H3z"/></svg></div>
  <div class="docs-demo-tb-btn" title="Line & paragraph spacing"><svg viewBox="0 0 24 24"><path d="M6 7h2.5L5 3.5 1.5 7H4v10H1.5L5 20.5 8.5 17H6V7zm4-2v2h12V5H10zm0 14h12v-2H10v2zm0-6h12v-2H10v2z"/></svg></div>
  <div class="docs-demo-tb-btn" title="Checklist"><svg viewBox="0 0 24 24"><path d="M22 7h-9v2h9V7zm0 8h-9v2h9v-2zM5.54 11L2 7.46l1.41-1.41 2.12 2.12 4.24-4.24 1.41 1.41L5.54 11zm0 8L2 15.46l1.41-1.41 2.12 2.12 4.24-4.24 1.41 1.41L5.54 19z"/></svg></div>
  <div class="docs-demo-tb-btn" title="Bulleted list"><svg viewBox="0 0 24 24"><path d="M4 10.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm0-6c-.83 0-1.5.67-1.5 1.5S3.17 7.5 4 7.5 5.5 6.83 5.5 6 4.83 4.5 4 4.5zm0 12c-.83 0-1.5.68-1.5 1.5s.68 1.5 1.5 1.5 1.5-.68 1.5-1.5-.67-1.5-1.5-1.5zM7 19h14v-2H7v2zm0-6h14v-2H7v2zm0-8v2h14V5H7z"/></svg></div>
  <div class="docs-demo-tb-btn" title="Numbered list"><svg viewBox="0 0 24 24"><path d="M2 17h2v.5H3v1h1v.5H2v1h3v-4H2v1zm1-9h1V4H2v1h1v3zm-1 3h1.8L2 13.1v.9h3v-1H3.2L5 10.9V10H2v1zm5-6v2h14V5H7zm0 14h14v-2H7v2zm0-6h14v-2H7v2z"/></svg></div>

  <div class="docs-demo-tb-sep"></div>
  <div class="docs-demo-tb-btn" title="Decrease indent"><svg viewBox="0 0 24 24"><path d="M11 17h10v-2H11v2zm-8-5l4 4V8l-4 4zm0 9h18v-2H3v2zM3 3v2h18V3H3zm8 6h10V7H11v2zm0 4h10v-2H11v2z"/></svg></div>
  <div class="docs-demo-tb-btn" title="Increase indent"><svg viewBox="0 0 24 24"><path d="M3 21h18v-2H3v2zM3 8v8l4-4-4-4zm8 9h10v-2H11v2zM3 3v2h18V3H3zm8 6h10V7H11v2zm0 4h10v-2H11v2z"/></svg></div>

  <div class="docs-demo-tb-sep"></div>
  <div class="docs-demo-tb-btn" title="Clear formatting"><svg viewBox="0 0 24 24"><path d="M3.27 5L2 6.27l6.97 6.97L6.5 19h3l1.57-3.66L16.73 21 18 19.73 3.27 5zM6 5v.18L8.82 8h2.4l-.72 1.68 2.1 2.1L14.21 8H20V5H6z"/></svg></div>
  <div class="docs-demo-tb-btn" title="More"><svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></div>
</div>

<!-- ─── RULER ─── -->
<div class="docs-demo-ruler-area"></div>

<!-- ─── DOCUMENT AREA ─── -->
<div class="docs-demo-doc-area">
  <div class="docs-demo-left-sidebar">
    <button class="docs-demo-sidebar-btn" id="docs-demo-about-btn">
      <svg viewBox="0 0 20 20" fill="none" style="fill:none"><circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M10 9v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/><circle cx="10" cy="6.5" r="1.25" fill="currentColor" stroke="none"/></svg>
      What is this?
    </button>
    <button class="docs-demo-sidebar-btn" id="docs-demo-sample-btn">
      <svg viewBox="0 0 20 20" fill="none"><path d="M4 5h12M4 9h8M4 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Add sample text
    </button>
    <button class="docs-demo-sidebar-btn docs-demo-sidebar-btn--demo" id="docs-demo-rundemo-btn">
      <svg viewBox="0 0 20 20" fill="none" style="fill:none"><polygon points="5,3 17,10 5,17" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/></svg>
      Show me the demo
    </button>
  </div>
  <div class="docs-demo-doc-canvas-wrapper">
    <div class="docs-demo-page">
      <div class="docs-demo-page-content" id="docs-demo-page-content" contenteditable="true">
        <p>Start typing here...</p>
      </div>
    </div>
    <div class="docs-demo-comments-gutter" id="docs-demo-comments-gutter"></div>
  </div>
</div>

<!-- ─── COMMAND PILL ─── -->
<div class="docs-demo-command-pill-wrapper" id="docs-demo-command-pill-wrapper">
  <div class="docs-demo-command-pill" id="docs-demo-command-pill">
    <div class="docs-demo-command-row">
      <img src="{{ url_for('docs_demo.static', filename='docs_demo/Gemini-icon.png') }}" alt="Gemini" class="docs-demo-pill-gemini-icon">
      <div class="docs-demo-command-input-wrap">
        <textarea id="docs-demo-command-input" placeholder="Type / for commands or ask Gemini anything..." rows="1"></textarea>
        <div class="docs-demo-autocomplete" id="docs-demo-autocomplete"></div>
      </div>
      <div class="docs-demo-spinner" id="docs-demo-spinner" style="display:none;"></div>
      <button class="docs-demo-send-btn" id="docs-demo-send-btn" type="button" title="Submit">
        <svg viewBox="0 0 20 20" fill="none" style="fill:none"><path d="M3 10h14M11 4l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="docs-demo-help-btn" id="docs-demo-help-btn" type="button" title="Show commands">?</button>
    </div>
    <div class="docs-demo-error" id="docs-demo-error" style="display:none;"></div>
  </div>
</div>

<!-- ─── STATUS BAR ─── -->
<div class="docs-demo-status-bar">
  <div class="docs-demo-status-left">
    <span>1 of 1</span>
    <span id="docs-demo-word-count">0 words</span>
  </div>
  <div class="docs-demo-status-right">
    <div class="docs-demo-zoom-control">100%</div>
  </div>
</div>

<script>
  const API_BASE = "{{ url_for('docs_demo.api_generate') }}";
</script>
<script src="{{ url_for('docs_demo.static', filename='docs_demo/app.js') }}"></script>

</body>
</html>
